<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="纸页日记发布页面，像手账一样写下一篇新文章。" />
    <title>发布新文章 | 纸页日记</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="paper-noise" aria-hidden="true"></div>
    <div class="cursor-glow" aria-hidden="true"></div>

    <header class="topbar">
      <a class="brand" href="./index.html">
        <span class="brand-mark">P</span>
        <span>
          <strong>纸页日记</strong>
          <small>写给自己看的温柔记录</small>
        </span>
      </a>

      <nav class="nav">
        <a href="./index.html">首页</a>
        <a href="./posts.html">文章</a>
        <a href="./post.html">详情</a>
        <a href="./about.html">关于</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="publish-hero reveal">
        <div class="section-heading">
          <p class="eyebrow">发布文章</p>
          <h2>像往手账里贴一张新的便签，写下今天想留下的话。</h2>
        </div>

        <div class="publish-meta">
          <span>本地自动保存</span>
          <span>支持封面预览</span>
          <span>发布后自动跳转</span>
        </div>

        <div class="publish-layout">
          <form class="publish-form float-card">
            <label>
              标题
              <input type="text" name="title" placeholder="例如：在黄昏之前，把心事折成纸条" />
            </label>
            <label>
              分类
              <select name="category">
                <option>旅行</option>
                <option>读书</option>
                <option>日常</option>
                <option>随笔</option>
              </select>
            </label>
            <label>
              封面文案
              <input type="text" name="excerpt" placeholder="一句像便签标题的话" />
            </label>
            <label>
              封面图片链接
              <input type="url" name="coverUrl" placeholder="https://..." />
            </label>
            <label>
              上传封面图
              <input type="file" name="coverFile" accept="image/*" />
            </label>
            <div class="cover-preview-shell">
              <div class="cover-preview" id="coverPreview">
                <span>封面预览</span>
              </div>
              <p class="cover-help">你可以上传本地图片，或者直接填一个网络图片链接。</p>
            </div>
            <label>
              正文
              <textarea name="body" rows="12" placeholder="开始写下你的内容..."></textarea>
            </label>
            <div class="form-actions">
              <button type="button" class="btn btn-secondary" id="saveDraftBtn">保存草稿</button>
              <button type="submit" class="btn btn-primary">发布文章</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 纸页日记</p>
    </footer>

    <script src="./blog-config.js"></script>
    <script src="./blog-data.js"></script>
    <script src="./backend.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
