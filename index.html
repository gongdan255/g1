<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="一套温暖纸感的手账日记系统，记录文章、日记、相册和月度回顾。" />
    <title>慢慢记 | 手账日记系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-page="home">
    <div class="paper-noise" aria-hidden="true"></div>
    <header class="topbar">
      <a class="brand" href="./index.html">
        <span class="brand-mark">慢</span>
        <span>
          <strong>慢慢记</strong>
          <small>日记、文章、相册和月度回顾</small>
        </span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a href="./index.html" data-nav="home">首页</a>
        <a href="./diary.html" data-nav="diary">日记</a>
        <a href="./posts.html" data-nav="posts">文章</a>
        <a href="./albums.html" data-nav="albums">相册</a>
        <a href="./calendar.html" data-nav="calendar">日历</a>
        <a href="./review.html" data-nav="review">回顾</a>
        <a href="./about.html" data-nav="about">关于</a>
      </nav>
      <a class="write-button" href="./publish.html">+ 记录</a>
    </header>

    <main class="page-shell">
      <section class="dashboard-hero reveal">
        <div class="hero-copy">
          <p class="eyebrow">今日记录台</p>
          <h1>把日子收进一页温暖的纸里。</h1>
          <p>
            这里可以写长文章，也可以记下一天的心情、天气、今日小事，或者用 3-5 张照片整理一个相册集。
          </p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="./publish.html">写一条记录</a>
            <a class="btn btn-secondary" href="./calendar.html">查看日历</a>
          </div>
        </div>
        <aside class="today-card panel">
          <p class="panel-label">Today</p>
          <h2 id="todayTitle">今天</h2>
          <div class="today-grid">
            <span>心情</span><strong id="todayMood">平静</strong>
            <span>天气</span><strong id="todayWeather">晴</strong>
            <span>记录</span><strong id="todayCount">0 条</strong>
          </div>
          <div class="little-list" id="homeLittleThings"></div>
        </aside>
      </section>

      <section class="section reveal">
        <div class="section-heading compact">
          <p class="eyebrow">最近日记</p>
          <h2>短短几行，也算认真生活过。</h2>
        </div>
        <div class="diary-strip" id="homeDiaries"></div>
      </section>

      <section class="home-grid reveal">
        <div class="panel">
          <div class="section-heading compact">
            <p class="eyebrow">精选文章</p>
            <h2>适合慢慢读的长记录。</h2>
          </div>
          <div class="entry-list" id="homePosts"></div>
        </div>
        <div class="panel">
          <div class="section-heading compact">
            <p class="eyebrow">最近相册</p>
            <h2>三五张照片，留住一段时间。</h2>
          </div>
          <div class="album-mini-list" id="homeAlbums"></div>
        </div>
      </section>

      <section class="section reveal">
        <div class="section-heading compact">
          <p class="eyebrow">本月回顾</p>
          <h2>把散落的小事，整理成一个月的轮廓。</h2>
        </div>
        <div class="review-band" id="homeReview"></div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 慢慢记 · 写给认真生活的每一天</p>
    </footer>

    <script src="./blog-config.js"></script>
    <script src="./blog-data.js"></script>
    <script src="./backend.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
